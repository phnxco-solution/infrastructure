name: buduci-klasici

services:
  app:
    image: ghcr.io/phnxco-solution/buduci-klasici:latest
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: app
    volumes:
      - /opt/volumes/apps/buduci-klasici/storage:/var/www/html/storage
    networks:
      default:
        aliases:
          - buduci-klasici-fpm
      backend:
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx:
    image: ghcr.io/phnxco-solution/buduci-klasici-nginx:latest
    restart: unless-stopped
    volumes:
      - /opt/volumes/apps/buduci-klasici/storage/app/public:/var/www/html/public/storage:ro
    networks:
      - default
      - traefik-public
    depends_on:
      app:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.buduci-klasici.rule=Host(`buduci-klasici.phnx-solution.com`)"
      - "traefik.http.routers.buduci-klasici.entrypoints=websecure"
      - "traefik.http.routers.buduci-klasici.tls=true"
      - "traefik.http.services.buduci-klasici.loadbalancer.server.port=80"
      - "traefik.http.services.buduci-klasici.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.buduci-klasici.loadbalancer.healthcheck.interval=15s"
    deploy:
      resources:
        limits:
          memory: 64M

  # Inertia SSR. The app posts pages here to render; if this is down the
  # gateway swallows the error and falls back to client-side rendering, so
  # it never takes the site with it. Deliberately no env_file — it renders
  # from the request payload and has no need for the app's secrets.
  ssr:
    image: ghcr.io/phnxco-solution/buduci-klasici-ssr:latest
    restart: unless-stopped
    networks:
      default:
        aliases:
          - buduci-klasici-ssr
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:13714/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M

  worker:
    image: ghcr.io/phnxco-solution/buduci-klasici:latest
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work redis --max-jobs=1000 --max-time=3600 --tries=3 --backoff=15 --timeout=90 --memory=128
    volumes:
      - /opt/volumes/apps/buduci-klasici/storage:/var/www/html/storage
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    stop_signal: SIGTERM
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'artisan queue:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M

networks:
  default:
  traefik-public:
    external: true
  backend:
    external: true
