name: unimaginable-landing

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - /opt/volumes/apps/unimaginable-landing/public:/usr/share/nginx/html:ro
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.unimaginable-landing.rule=Host(`unimaginable.rs`)"
      - "traefik.http.routers.unimaginable-landing.entrypoints=websecure"
      - "traefik.http.routers.unimaginable-landing.tls=true"
      - "traefik.http.services.unimaginable-landing.loadbalancer.server.port=80"
      - "traefik.http.services.unimaginable-landing.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.unimaginable-landing.loadbalancer.healthcheck.interval=15s"
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  traefik-public:
    external: true
