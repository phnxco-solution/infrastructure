name: endlessly

services:
  app:
    image: ghcr.io/phnxco-solution/endlessly:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - /opt/volumes/apps/endlessly/storage:/app/storage
    networks:
      - traefik-public
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.endlessly.rule=Host(`endlessly.phnx-solution.com`)"
      - "traefik.http.routers.endlessly.entrypoints=websecure"
      - "traefik.http.routers.endlessly.tls=true"
      - "traefik.http.services.endlessly.loadbalancer.server.port=3000"
      - "traefik.http.services.endlessly.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.endlessly.loadbalancer.healthcheck.interval=15s"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  traefik-public:
    external: true
  backend:
    external: true
