name: endlessly

services:
  app:
    image: ghcr.io/phnxco-solution/endlessly:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - /opt/volumes/apps/endlessly/storage:/app/storage
      - /opt/volumes/apps/endlessly/logs:/app/logs
    networks:
      default:
        aliases:
          - endlessly-node
      backend:
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/volumes/apps/endlessly/storage:/data:ro
    networks:
      - default
      - traefik-public
    depends_on:
      app:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.endlessly.rule=Host(`endlessly.phnx-solution.com`)"
      - "traefik.http.routers.endlessly.entrypoints=websecure"
      - "traefik.http.routers.endlessly.tls=true"
      - "traefik.http.services.endlessly.loadbalancer.server.port=80"
      - "traefik.http.services.endlessly.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.endlessly.loadbalancer.healthcheck.interval=15s"
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  default:
  traefik-public:
    external: true
  backend:
    external: true
