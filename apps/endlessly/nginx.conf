server {
    listen 80;
    server_name _;

    # Defer upstream resolution to request time via Docker's embedded DNS,
    # so nginx doesn't crash at startup if the alias isn't in DNS yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 100M;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        text/css
        text/plain
        image/svg+xml;
    gzip_vary on;

    # Health check for Traefik
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Uploaded files served directly from storage volume
    location /uploads/ {
        alias /data/uploads/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Everything else proxied to Nuxt
    location / {
        # Variable forces runtime DNS lookup (paired with resolver above)
        set $upstream endlessly-node:3000;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
