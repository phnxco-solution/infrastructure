name: unimaginable-app

services:
  nginx:
    image: ghcr.io/phnxco-solution/unimaginable-app:latest
    restart: unless-stopped
    networks:
      - traefik-public
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.unimaginable-app.rule=Host(`unimaginable.phnx-solution.com`)"
      - "traefik.http.routers.unimaginable-app.entrypoints=websecure"
      - "traefik.http.routers.unimaginable-app.tls=true"
      - "traefik.http.services.unimaginable-app.loadbalancer.server.port=80"
      - "traefik.http.services.unimaginable-app.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.unimaginable-app.loadbalancer.healthcheck.interval=15s"
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  traefik-public:
    external: true
  backend:
    external: true
