name: blogmana

services:
  # Service is named 'web' (not 'app') so its DNS alias on traefik-public
  # doesn't collide with other projects also using a service named 'app'.
  web:
    image: ghcr.io/phnxco-solution/blogmana:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - /opt/volumes/apps/blogmana/storage:/app/storage
      - /opt/volumes/apps/blogmana/logs:/app/logs
    networks:
      - traefik-public
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blogmana.rule=Host(`mana.phnx-solution.com`)"
      - "traefik.http.routers.blogmana.entrypoints=websecure"
      - "traefik.http.routers.blogmana.tls=true"
      - "traefik.http.services.blogmana.loadbalancer.server.port=3000"
      - "traefik.http.services.blogmana.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.blogmana.loadbalancer.healthcheck.interval=15s"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  traefik-public:
    external: true
  backend:
    external: true
