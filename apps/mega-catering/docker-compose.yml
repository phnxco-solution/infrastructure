name: mega-catering

services:
  app:
    image: ghcr.io/phnxco-solution/mega-catering:latest
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: app
    volumes:
      - /opt/volumes/apps/mega-catering/storage:/var/www/html/storage
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx:
    image: ghcr.io/phnxco-solution/mega-catering-nginx:latest
    restart: unless-stopped
    volumes:
      - /opt/volumes/apps/mega-catering/storage/app/public:/var/www/html/public/storage:ro
    networks:
      - traefik-public
      - backend
    depends_on:
      app:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mega-catering.rule=Host(`mega-catering.phnx-solution.com`)"
      - "traefik.http.routers.mega-catering.entrypoints=websecure"
      - "traefik.http.routers.mega-catering.tls=true"
      - "traefik.http.services.mega-catering.loadbalancer.server.port=80"
      - "traefik.http.services.mega-catering.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.mega-catering.loadbalancer.healthcheck.interval=15s"
    deploy:
      resources:
        limits:
          memory: 64M

  worker:
    image: ghcr.io/phnxco-solution/mega-catering:latest
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work redis --max-jobs=1000 --max-time=3600 --tries=3 --backoff=15 --timeout=90 --memory=128
    volumes:
      - /opt/volumes/apps/mega-catering/storage:/var/www/html/storage
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    stop_signal: SIGTERM
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'artisan queue:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M

  scheduler:
    image: ghcr.io/phnxco-solution/mega-catering:latest
    restart: unless-stopped
    env_file: .env
    command: php artisan schedule:work
    volumes:
      - /opt/volumes/apps/mega-catering/storage:/var/www/html/storage
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    stop_signal: SIGTERM
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'artisan schedule:work' > /dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  traefik-public:
    external: true
  backend:
    external: true
