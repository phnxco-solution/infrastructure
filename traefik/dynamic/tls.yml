# TLS configuration using Cloudflare Origin Certificate
tls:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/origin.pem
        keyFile: /etc/traefik/certs/origin-key.pem
  certificates:
    # megacatering.rs — separate Cloudflare zone, own origin cert served via SNI
    - certFile: /etc/traefik/certs/megacatering.pem
      keyFile: /etc/traefik/certs/megacatering-key.pem
