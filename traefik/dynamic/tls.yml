# TLS configuration using Cloudflare Origin Certificate
tls:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/origin.pem
        keyFile: /etc/traefik/certs/origin-key.pem
  certificates:
    # megacatering.rs — separate Cloudflare zone, own origin cert served via SNI
    - certFile: /etc/traefik/certs/megacatering.pem
      keyFile: /etc/traefik/certs/megacatering-key.pem
    - certFile: /etc/traefik/certs/unimaginableapp.pem
      keyFile: /etc/traefik/certs/unimaginableapp-key.pem
    - certFile: /etc/traefik/certs/unimaginable.pem
      keyFile: /etc/traefik/certs/unimaginable-key.pem
    # dusanimarija.cloud — separate Cloudflare zone (endlessly's primary domain)
    - certFile: /etc/traefik/certs/dusanimarija.pem
      keyFile: /etc/traefik/certs/dusanimarija-key.pem
