name: {{APP_NAME}}

services:
  # Named 'web' for consistency with the other Node/SPA projects. NOTE: the service name
  # is a DNS alias on traefik-public and is NOT unique — several projects publish 'web',
  # several publish 'nginx', and resolving either round-robins across all of them. Never
  # address another project by service name; use the container name (<project>-<service>-1),
  # which is unique. That matters here: {{BACKEND_HOST}} must be a container name.
  web:
    image: ghcr.io/phnxco-solution/{{APP_NAME}}:latest
    restart: unless-stopped
    networks:
      - traefik-public
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{APP_NAME}}.rule=Host(`{{APP_DOMAIN}}`)"
      - "traefik.http.routers.{{APP_NAME}}.entrypoints=websecure"
      - "traefik.http.routers.{{APP_NAME}}.tls=true"
      - "traefik.http.services.{{APP_NAME}}.loadbalancer.server.port=80"
      - "traefik.http.services.{{APP_NAME}}.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.{{APP_NAME}}.loadbalancer.healthcheck.interval=15s"
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  traefik-public:
    external: true
  backend:
    external: true
