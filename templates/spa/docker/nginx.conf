server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Docker embedded DNS — defer upstream resolution to request time so the
    # container still starts when the backend isn't running yet.
    resolver 127.0.0.11 ipv6=off valid=10s;

    client_max_body_size 64M;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/manifest+json
        text/css
        text/plain
        text/xml
        image/svg+xml;
    gzip_vary on;

    # Health check for Traefik
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Service worker — never cache (must be revalidated to deliver updates)
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # Web app manifest — short cache so manifest changes propagate
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        types { } default_type "application/manifest+json";
        try_files $uri =404;
    }

    # Workbox runtime — content-hashed, immutable
    location ~ ^/workbox-[^/]+\.js$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Hashed Vite assets — immutable
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Other static assets (icons, splash, favicon) — short cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Backend API — proxied to the Laravel app over the internal docker network.
    # Remove this block if the SPA has no backend.
    location /api/ {
        set $backend_upstream "{{BACKEND_HOST}}";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Backend storage (uploads, generated audio, etc.) — proxied with range support
    location /storage/ {
        set $backend_upstream "{{BACKEND_HOST}}";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # SPA fallback — every unknown path returns index.html so the router takes over
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
