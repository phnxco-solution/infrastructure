services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    env_file: .env
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nuxt}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${EXTERNAL_DB_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  node-modules:
  mysql-data:

networks:
  backend:
