name: {{APP_NAME}}

services:
  app:
    image: ghcr.io/phnxco-solution/{{APP_NAME}}:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /opt/volumes/apps/{{APP_NAME}}/storage:/app/storage
    networks:
      - traefik-public
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{APP_NAME}}.rule=Host(`{{APP_DOMAIN}}`)"
      - "traefik.http.routers.{{APP_NAME}}.entrypoints=websecure"
      - "traefik.http.routers.{{APP_NAME}}.tls=true"
      - "traefik.http.services.{{APP_NAME}}.loadbalancer.server.port=3000"
      - "traefik.http.services.{{APP_NAME}}.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.{{APP_NAME}}.loadbalancer.healthcheck.interval=15s"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  traefik-public:
    external: true
  backend:
    external: true
