name: Build & Deploy

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: ghcr.io/phnxco-solution/{{APP_NAME}}
  NGINX_IMAGE_NAME: ghcr.io/phnxco-solution/{{APP_NAME}}-nginx
  APP_DIR: /opt/infrastructure/apps/{{APP_NAME}}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          # Uncomment for staging/dev deploys to install dev deps
          # (faker, ide-helper, pest, etc.). Leave commented or remove
          # for production — Dockerfile defaults to --no-dev.
          # build-args: |
          #   COMPOSER_NO_DEV=
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.nginx
          push: true
          tags: |
            ${{ env.NGINX_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.NGINX_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker pull ${{ env.NGINX_IMAGE_NAME }}:${{ github.sha }}
            docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
            docker tag ${{ env.NGINX_IMAGE_NAME }}:${{ github.sha }} ${{ env.NGINX_IMAGE_NAME }}:latest

            cd ${{ env.APP_DIR }}

            # Run migrations using new image while old containers still serve traffic
            # -T disables TTY (required for non-interactive SSH)
            docker compose run --rm -T app php artisan migrate --force --isolated

            # Recreate app, wait for healthy (--wait blocks until healthcheck passes)
            docker compose up -d --no-deps --wait --wait-timeout 60 app

            # Recreate nginx (Traefik-facing service — get it up right after app)
            docker compose up -d --no-deps --wait --wait-timeout 30 nginx --remove-orphans

            # Recreate background services (no traffic impact)
            docker compose up -d --no-deps worker scheduler

            docker compose ps
            docker image prune -af --filter "until=168h"
