server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Defer FPM hostname resolution to request time via Docker's embedded DNS,
    # so nginx doesn't crash at startup if the alias isn't in DNS yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 64M;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;
    gzip_vary on;

    # Health check for Traefik
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Vite built assets — immutable cache (filenames are hashed)
    location /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Storage files
    location /storage/ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Variable forces runtime DNS lookup (paired with resolver above).
        # Hostname must match the alias defined in the production compose
        # file. init.sh substitutes {{APP_NAME}} at scaffold time.
        set $fpm_upstream {{APP_NAME}}-fpm:9000;
        fastcgi_pass $fpm_upstream;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_buffering on;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
